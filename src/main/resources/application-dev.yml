spring:
  config:
    activate:
      on-profile: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

aws:
  region: us-east-1
  access-key-id: minioadmin
  secret-access-key: minioadmin
  endpoint: http://localhost:9000
  s3:
    bucket-name: mtracker
    path-style-access-enabled: true

app:
  frontend-url: ${MT_FRONTEND_URL:http://localhost:5173}

logging:
  level:
    org:
      springframework: INFO

management:
  endpoint:
    health:
      show-details: never
