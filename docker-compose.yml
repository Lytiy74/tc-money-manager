services:
  mysql:
    image: mysql:8.3.0
    container_name: mtracker-mysql
    environment:
      MYSQL_DATABASE: mtracker
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -proot" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: mtracker-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:latest
    container_name: mtracker-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing local/mtracker

  mailpit:
    image: axllent/mailpit:latest
    container_name: mtracker-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
